name: Sync sandbox mirror

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sandbox
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "sandbox-sync-bot"
          git config user.email "actions@github.com"

      - name: Sync laetiva-backend into repo root
        env:
          SRC_TOKEN: ${{ secrets.SOURCE_REPOS_TOKEN }}
        run: |
          git clone --depth 1 https://x-access-token:${SRC_TOKEN}@github.com/LaetivaTech/laetiva-backend.git /tmp/laetiva-backend
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' ! -name 'website' ! -name 'vendor-portal' -exec rm -rf {} +
          rsync -a --exclude='.git' --exclude='.github' /tmp/laetiva-backend/ ./

      - name: Sync laetiva-website into website/
        env:
          SRC_TOKEN: ${{ secrets.SOURCE_REPOS_TOKEN }}
        run: |
          git clone --depth 1 https://x-access-token:${SRC_TOKEN}@github.com/LaetivaTech/laetiva-website.git /tmp/laetiva-website
          rm -rf website
          mkdir website
          rsync -a --exclude='.git' --exclude='.github' /tmp/laetiva-website/ website/

      - name: Sync laetiva-vendor-portal into vendor-portal/
        env:
          SRC_TOKEN: ${{ secrets.SOURCE_REPOS_TOKEN }}
        run: |
          git clone --depth 1 https://x-access-token:${SRC_TOKEN}@github.com/LaetivaTech/laetiva-vendor-portal.git /tmp/laetiva-vendor-portal
          rm -rf vendor-portal
          mkdir vendor-portal
          rsync -a --exclude='.git' --exclude='.github' /tmp/laetiva-vendor-portal/ vendor-portal/

      - name: Commit and push if anything changed
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes since last sync."
          else
            git commit -m "Auto-sync from laetiva-backend, laetiva-website, laetiva-vendor-portal"
            git push origin main
          fi
